<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #fff9e6; min-height: 100vh; overflow-x: hidden; }
.stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; border-radius:50%; background:#ffe066; opacity:0.18; animation:twinkle 3s infinite ease-in-out; }
@keyframes twinkle { 0%,100%{transform:scale(1);opacity:0.18} 50%{transform:scale(1.4);opacity:0.35} }
.screen { display:none; position:relative; z-index:1; max-width:460px; margin:0 auto; padding:1.25rem 1rem 2rem; flex-direction:column; align-items:center; }
.screen.active { display:flex; }
.card { background:#fff; border:3px solid #222; border-radius:20px; box-shadow:5px 5px 0 #222; width:100%; padding:1rem 1.25rem; margin-bottom:0.85rem; }
.title-badge { font-family:'Fredoka One',cursive; font-size:14px; letter-spacing:2px; color:#fff; background:#e8473f; border:3px solid #222; border-radius:999px; padding:4px 18px; box-shadow:3px 3px 0 #222; margin-bottom:0.75rem; text-transform:uppercase; }
#setup-screen { padding-top:2rem; }
.setup-title { font-family:'Fredoka One',cursive; font-size:36px; color:#222; text-align:center; margin-bottom:0.25rem; }
.setup-sub { font-size:14px; color:#888; font-weight:700; text-align:center; margin-bottom:1.5rem; }
.mode-btn { font-family:'Fredoka One',cursive; font-size:20px; border:3px solid #222; border-radius:16px; padding:14px 24px; cursor:pointer; box-shadow:5px 5px 0 #222; width:100%; margin-bottom:0.75rem; transition:transform .08s,box-shadow .08s; text-align:left; display:flex; align-items:center; gap:12px; }
.mode-btn:active { transform:translate(3px,3px); box-shadow:2px 2px 0 #222; }
.mode-btn.blue { background:#3b82f6; color:#fff; }
.mode-btn.yellow { background:#ffe066; color:#222; }
.mode-icon { font-size:28px; }
.mode-text { display:flex; flex-direction:column; }
.mode-text small { font-family:'Nunito',sans-serif; font-size:12px; font-weight:700; opacity:0.75; }
.combo-card { background:linear-gradient(160deg,#3b82f6 0%,#6366f1 100%); border:3px solid #222; border-radius:24px; box-shadow:6px 6px 0 #222; width:100%; padding:1.25rem 1.5rem 1rem; margin-bottom:0.85rem; text-align:center; }
.combo-label { font-family:'Fredoka One',cursive; font-size:12px; letter-spacing:3px; color:rgba(255,255,255,.7); text-transform:uppercase; margin-bottom:2px; }
#tap-count { font-family:'Fredoka One',cursive; font-size:96px; color:#fff; line-height:1; text-shadow:4px 4px 0 rgba(0,0,0,.2); transition:transform .06s ease; }
#tap-count.flash { transform:scale(1.1); color:#ffe066; }
#hit-label { font-family:'Fredoka One',cursive; font-size:16px; color:rgba(255,255,255,.8); letter-spacing:1px; }
#power-bar-wrap { width:100%; height:12px; background:rgba(0,0,0,.2); border-radius:999px; border:2px solid rgba(0,0,0,.2); margin-top:0.85rem; overflow:hidden; }
#power-bar { height:100%; width:0%; background:linear-gradient(90deg,#ffe066,#ff9500); border-radius:999px; transition:width .04s; }
.power-label { font-size:10px; color:rgba(255,255,255,.6); text-align:right; margin-top:2px; font-weight:900; letter-spacing:1px; text-transform:uppercase; }
#hand-indicator { display:none; width:100%; margin-bottom:0.85rem; }
#hand-indicator.visible { display:flex; gap:8px; }
.hand-pill { flex:1; text-align:center; font-family:'Fredoka One',cursive; font-size:15px; border:3px solid #222; border-radius:999px; padding:6px 12px; box-shadow:3px 3px 0 #222; }
.hand-pill.right-active { background:#e8473f; color:#fff; }
.hand-pill.left-active  { background:#16a34a; color:#fff; }
.hand-pill.done         { background:#f5f5f5; color:#aaa; }
.bpm-row { display:flex; align-items:center; justify-content:center; gap:24px; width:100%; margin-bottom:0.85rem; }
.bpm-deco { font-size:28px; animation:deco-idle 2.4s infinite ease-in-out; user-select:none; }
#bpm-deco-right { animation-delay:-1.2s; }
@keyframes deco-idle { 0%,100%{transform:translateY(0) scale(1);opacity:.5} 50%{transform:translateY(-6px) scale(1.1);opacity:.9} }
.metric-card { background:#fff; border:3px solid #222; border-radius:16px; box-shadow:4px 4px 0 #222; padding:0.65rem 1.5rem; text-align:center; }
.metric-card .m-label { font-size:10px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:#888; margin-bottom:2px; }
.metric-card .m-value { font-family:'Fredoka One',cursive; font-size:32px; color:#222; line-height:1.1; }
.metric-card.bpm-card { background:#fef3c7; }
.metric-card.bpm-card .m-value { color:#d97706; }
.badges-title { font-size:10px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:#888; margin-bottom:8px; }
#badges-row { display:flex; gap:8px; flex-wrap:wrap; }
.badge { display:flex; flex-direction:column; align-items:center; justify-content:center; width:58px; padding:6px 4px 4px; border:2.5px solid #222; border-radius:12px; box-shadow:3px 3px 0 #222; opacity:0.22; filter:grayscale(1); transition:opacity .3s,filter .3s,transform .2s; background:#f9f9f9; }
.badge.earned { opacity:1; filter:none; }
.badge.just-earned { animation:badge-pop .4s ease; }
@keyframes badge-pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
.badge-icon { font-size:22px; line-height:1; }
.badge-name { font-size:9px; font-weight:900; text-align:center; margin-top:2px; color:#444; letter-spacing:0.5px; }
.badge-count { font-family:'Fredoka One',cursive; font-size:11px; color:#888; }
#status { font-size:12px; font-weight:700; color:#888; text-align:center; margin-bottom:0.5rem; min-height:16px; letter-spacing:0.5px; }
.sensitivity-card { background:#f0fdf4; }
.s-label { font-size:10px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:#16a34a; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
.s-label span { font-family:'Fredoka One',cursive; font-size:16px; color:#222; }
input[type=range] { width:100%; accent-color:#3b82f6; }
.btn-row { display:flex; gap:8px; width:100%; justify-content:center; }
.btn { font-family:'Fredoka One',cursive; font-size:17px; border:3px solid #222; border-radius:14px; padding:10px 20px; cursor:pointer; box-shadow:4px 4px 0 #222; transition:transform .08s,box-shadow .08s; letter-spacing:.5px; }
.btn:active { transform:translate(3px,3px); box-shadow:1px 1px 0 #222; }
.btn-red    { background:#e8473f; color:#fff; flex:1; }
.btn-red.paused { background:#f97316; }
.btn-yellow { background:#ffe066; color:#222; }
.btn-green  { background:#16a34a; color:#fff; flex:1; }
.btn-purple { background:#6366f1; color:#fff; }
.burst { position:fixed; pointer-events:none; z-index:999; font-family:'Fredoka One',cursive; font-size:26px; color:#ffe066; text-shadow:2px 2px 0 #222; animation:burst-anim .5s ease-out forwards; white-space:nowrap; }
@keyframes burst-anim { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.4)} }
.emoji-flooder { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5; overflow:hidden; }
.flood-emoji { position:absolute; animation:flood-rise linear forwards; }
@keyframes flood-rise { 0%{opacity:0.85;transform:translateY(0)} 100%{opacity:0;transform:translateY(-110vh)} }
#celebrate-screen { padding-top:1.5rem; }
.celebrate-title { font-family:'Fredoka One',cursive; font-size:42px; color:#e8473f; text-align:center; text-shadow:3px 3px 0 #222; margin-bottom:0.25rem; }
.celebrate-sub { font-size:14px; font-weight:900; color:#888; text-align:center; margin-bottom:0.25rem; }
.celebrate-datetime { font-size:12px; font-weight:700; color:#aaa; text-align:center; margin-bottom:1rem; letter-spacing:0.5px; }
canvas#confetti-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:2; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; margin-bottom:0.85rem; }
.stat-box { background:#fff; border:3px solid #222; border-radius:16px; box-shadow:4px 4px 0 #222; padding:0.75rem; text-align:center; }
.stat-box .s-num { font-family:'Fredoka One',cursive; font-size:32px; color:#3b82f6; line-height:1; }
.stat-box .s-lbl { font-size:10px; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; color:#888; }
.hand-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; margin-bottom:0.85rem; }
.hand-stat-box { border:3px solid #222; border-radius:16px; box-shadow:4px 4px 0 #222; padding:0.75rem; text-align:center; }
.hand-stat-box.right-box { background:#fff0f0; }
.hand-stat-box.left-box  { background:#f0fff4; }
.hand-stat-box .hs-num { font-family:'Fredoka One',cursive; font-size:28px; line-height:1; }
.right-box .hs-num { color:#e8473f; }
.left-box  .hs-num { color:#16a34a; }
.hand-stat-box .hs-lbl { font-size:10px; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; color:#888; }
.celebrate-badges { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:1rem; }
.celebrate-badge { display:flex; flex-direction:column; align-items:center; background:#fff; border:3px solid #222; border-radius:14px; box-shadow:4px 4px 0 #222; padding:10px 12px 6px; }
.celebrate-badge .cb-icon { font-size:30px; }
.celebrate-badge .cb-name { font-size:10px; font-weight:900; color:#444; letter-spacing:.5px; margin-top:3px; }
.celebrate-btn-row { display:flex; gap:8px; width:100%; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<canvas id="confetti-canvas"></canvas>
<div class="emoji-flooder" id="emoji-flooder"></div>

<!-- SETUP -->
<div class="screen active" id="setup-screen">
  <div class="setup-title">🥁 Drum Battle!</div>
  <div class="setup-sub">Choose your training mode</div>
  <button class="mode-btn blue" onclick="startMode('simple')">
    <span class="mode-icon">⚡</span>
    <span class="mode-text">Simple Count<small>Just count every hit — no hands</small></span>
  </button>
  <button class="mode-btn yellow" onclick="startMode('hands')">
    <span class="mode-icon">🤜🤛</span>
    <span class="mode-text">Hand Mode<small>Track right hand + left hand separately</small></span>
  </button>
  <div style="width:100%;margin-top:0.5rem;">
    <div class="sensitivity-card card">
      <div class="s-label">🎚 Sensitivity <span id="setup-thresh-val">27</span></div>
      <input type="range" id="setup-threshold" min="1" max="30" step="1" value="27">
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="main-screen">
  <div class="title-badge">⚡ Drum Battle ⚡</div>
  <div id="hand-indicator">
    <div class="hand-pill right-active" id="right-pill">👊 Right Hand</div>
    <div class="hand-pill done" id="left-pill">✋ Left Hand</div>
  </div>
  <div class="combo-card">
    <div class="combo-label" id="combo-label">Combo Hits</div>
    <div id="tap-count">0</div>
    <div id="hit-label">HIT!</div>
    <div id="power-bar-wrap"><div id="power-bar"></div></div>
    <div class="power-label">Power level</div>
  </div>
  <div class="bpm-row">
    <div class="bpm-deco" id="bpm-deco-left">🎵</div>
    <div class="metric-card bpm-card">
      <div class="m-label">Speed</div>
      <div class="m-value" id="bpm">—</div>
      <div style="font-size:9px;font-weight:900;color:#d97706;letter-spacing:1px;">BPM</div>
    </div>
    <div class="bpm-deco" id="bpm-deco-right">🎶</div>
  </div>
  <div class="card">
    <div class="badges-title">🏅 Badges</div>
    <div id="badges-row"></div>
  </div>
  <div id="status">Press START to begin!</div>
  <div class="btn-row" id="main-btns">
    <button class="btn btn-red" onclick="handleStart()">▶ START</button>
    <button class="btn btn-yellow" onclick="goToSetup()">↩ Back</button>
  </div>
  <div class="btn-row" id="running-btns" style="display:none;">
    <button class="btn btn-red" id="pause-btn" onclick="handlePause()">⏸ PAUSE</button>
    <button class="btn btn-green" id="switch-btn" onclick="handleSwitch()" style="display:none;">✋ Switch to Left</button>
    <button class="btn btn-purple" onclick="handleFinish()">🏁 FINISH</button>
  </div>
</div>

<!-- CELEBRATE -->
<div class="screen" id="celebrate-screen">
  <div class="celebrate-title">🎉 AMAZING! 🎉</div>
  <div class="celebrate-sub" id="cel-sub"></div>
  <div class="celebrate-datetime" id="cel-datetime"></div>
  <div class="stat-grid" id="cel-stat-grid"></div>
  <div class="hand-stats" id="cel-hand-stats" style="display:none;"></div>
  <div class="card" style="margin-bottom:0.85rem;">
    <div class="badges-title">🏅 Badges Earned</div>
    <div class="celebrate-badges" id="cel-badges"></div>
  </div>
  <div class="celebrate-btn-row">
    <button class="btn btn-yellow" style="flex:1" onclick="downloadCelebration()">⬇ Save Picture</button>
    <button class="btn btn-red" style="flex:1" onclick="playAgain()">▶ Play Again</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  AUDIO-THREAD STATE
//  Only primitives. No DOM access whatsoever.
// ════════════════════════════════════════════
let audioTapCount   = 0;   // total taps detected - read by rAF loop
let audioEnergy     = 0;   // current RMS energy  - read by rAF loop
let audioCooldownUntil = 0;
let audioLastEnergy    = 0;
let audioRunning    = false;
let audioPaused     = false;
// BPM ring buffer - written by audio thread, read by rAF
const BPM_WINDOW    = 8;
let bpmTimes        = [];  // timestamps of last N hits (performance.now())

let cachedThreshold = 4;
function getThreshold() { return cachedThreshold; }

// Called ONLY from onaudioprocess. Touches NO DOM.
function audioOnProcess(e) {
  if (!audioRunning || audioPaused) return;
  const input = e.inputBuffer.getChannelData(0);
  let sum = 0;
  for (let i = 0; i < input.length; i++) sum += input[i] * input[i];
  const rms   = Math.sqrt(sum / input.length);
  const energy = rms * 100;
  audioEnergy = energy;
  const delta = energy - audioLastEnergy;
  const now = performance.now();
  if (now > audioCooldownUntil && delta > getThreshold() && energy > 2) {
    audioTapCount++;
    bpmTimes.push(now);
    if (bpmTimes.length > BPM_WINDOW + 1) bpmTimes.shift();
    audioCooldownUntil = now + 60;
  }
  audioLastEnergy = energy;
}

// ════════════════════════════════════════════
//  APP STATE  (main thread only)
// ════════════════════════════════════════════
let mode        = 'simple';
let handPhase   = 'right';
let rightCount  = 0;
let leftCount   = 0;
let displayedCount = 0;   // what the counter currently shows
let sessionMaxBpm  = 0;
let earnedBadges   = new Set();
let floodActive    = false;

let audioCtx, source, processor, stream;

const BADGE_DEFS = [
  { count:1,    icon:'⭐', name:'First Hit!', color:'#fef9c3' },
  { count:50,   icon:'🔥', name:'On Fire!',   color:'#fff0e0' },
  { count:100,  icon:'💯', name:'100 Club',   color:'#e0f0ff' },
  { count:250,  icon:'⚡', name:'Lightning',  color:'#f0e8ff' },
  { count:500,  icon:'🏆', name:'Champion',   color:'#fff0e0' },
  { count:1000, icon:'👑', name:'Legend',     color:'#fff9c3' },
];

const COMBO_WORDS = ['NICE!','GREAT!','AWESOME!','POW!','ZAP!','BOOM!','WOW!','FIRE!','YES!','SICK!','EPIC!','WILD!'];

// ── DOM refs ──
const countEl     = document.getElementById('tap-count');
const bpmEl       = document.getElementById('bpm');
const powerBar    = document.getElementById('power-bar');
const statusEl    = document.getElementById('status');
const badgesRow   = document.getElementById('badges-row');
const pauseBtn    = document.getElementById('pause-btn');
const switchBtn   = document.getElementById('switch-btn');
const mainBtns    = document.getElementById('main-btns');
const runningBtns = document.getElementById('running-btns');
const handInd     = document.getElementById('hand-indicator');
const rightPill   = document.getElementById('right-pill');
const leftPill    = document.getElementById('left-pill');
const comboLabel  = document.getElementById('combo-label');
const flooder     = document.getElementById('emoji-flooder');

// ── stars ──
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div'); s.className = 'star';
    const sz = 6 + Math.random() * 14;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*2}s;`;
    c.appendChild(s);
  }
})();

// ── setup slider ──
document.getElementById('setup-threshold').addEventListener('input', function() {
  document.getElementById('setup-thresh-val').textContent = this.value;
  cachedThreshold = 31 - parseInt(this.value);
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ════════════════════════════════════════════
//  RAF LOOP — all DOM updates happen here
// ════════════════════════════════════════════
let rafRunning = false;
let lastDisplayedAudioCount = 0;  // tracks what rAF last saw from audio thread

let flashUntil = 0;

function rafLoop() {
  if (!rafRunning) return;
  requestAnimationFrame(rafLoop);

  const now = performance.now();

  // power bar
  powerBar.style.width = Math.min(audioEnergy * 4, 100).toFixed(1) + '%';

  // handle flash state - no setTimeout needed
  if (now > flashUntil && countEl.classList.contains('flash')) {
    countEl.classList.remove('flash');
  }

  // check if audio thread registered new taps since last frame
  const newTaps = audioTapCount - lastDisplayedAudioCount;
  if (newTaps > 0) {
    lastDisplayedAudioCount = audioTapCount;
    displayedCount += newTaps;

    // update counter and trigger flash
    countEl.textContent = displayedCount;
    countEl.classList.add('flash');
    flashUntil = now + 120;

    // every 10 hits spawn a word burst
    const prev = displayedCount - newTaps;
    for (let i = 1; i <= newTaps; i++) {
      if ((prev + i) % 10 === 0) spawnBurst();
    }

    // check badges
    checkBadges(displayedCount);

    // BPM from ring buffer
    if (bpmTimes.length >= 3) {
      const gaps = [];
      for (let i = 1; i < bpmTimes.length; i++) gaps.push(bpmTimes[i] - bpmTimes[i-1]);
      const avg = gaps.reduce((a,b) => a+b, 0) / gaps.length;
      const bpm = Math.round(60000 / avg);
      bpmEl.textContent = bpm;
      if (bpm > sessionMaxBpm) sessionMaxBpm = bpm;
    }
  }
}

// ════════════════════════════════════════════
//  AUDIO SETUP
// ════════════════════════════════════════════
async function startAudio() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaStreamSource(stream);
    processor = audioCtx.createScriptProcessor(256, 1, 1);
    source.connect(processor);
    processor.connect(audioCtx.destination);
    processor.onaudioprocess = audioOnProcess;
    audioRunning = true;
    return true;
  } catch(e) {
    statusEl.textContent = 'Mic access denied — check browser permissions.';
    return false;
  }
}

function stopAudio() {
  audioRunning = false;
  audioPaused  = false;
  if (processor) { processor.disconnect(); processor.onaudioprocess = null; processor = null; }
  if (source)    { source.disconnect(); source = null; }
  if (stream)    { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (audioCtx)  { audioCtx.close(); audioCtx = null; }
}

// ════════════════════════════════════════════
//  BUTTON HANDLERS
// ════════════════════════════════════════════
function startMode(m) {
  mode = m;
  resetAll();
  buildBadges();
  if (mode === 'hands') {
    handInd.classList.add('visible');
    switchBtn.style.display = '';
    comboLabel.textContent = 'Right Hand Hits';
  } else {
    handInd.classList.remove('visible');
    switchBtn.style.display = 'none';
    comboLabel.textContent = 'Combo Hits';
  }
  mainBtns.style.display = 'flex';
  runningBtns.style.display = 'none';
  showScreen('main-screen');
}

function goToSetup() {
  stopAudio();
  rafRunning = false;
  resetAll();
  showScreen('setup-screen');
}

async function handleStart() {
  const ok = await startAudio();
  if (!ok) return;
  audioPaused = false;
  rafRunning = true;
  requestAnimationFrame(rafLoop);
  mainBtns.style.display = 'none';
  runningBtns.style.display = 'flex';
  statusEl.textContent = mode === 'hands' ? 'Right hand — go!' : 'Listening for hits…';
}

function handlePause() {
  if (!audioPaused) {
    audioPaused = true;
    pauseBtn.textContent = '▶ RESUME';
    pauseBtn.classList.add('paused');
    statusEl.textContent = 'Paused. Hit RESUME to continue!';
  } else {
    audioPaused = false;
    pauseBtn.textContent = '⏸ PAUSE';
    pauseBtn.classList.remove('paused');
    statusEl.textContent = mode === 'hands' ? (handPhase === 'right' ? 'Right hand — go!' : 'Left hand — go!') : 'Listening for hits…';
  }
}

function handleSwitch() {
  if (mode !== 'hands' || handPhase !== 'right') return;
  // save right hand count, reset for left
  rightCount = displayedCount;
  displayedCount = 0;
  audioTapCount = 0;
  lastDisplayedAudioCount = 0;
  bpmTimes = [];
  earnedBadges = new Set();
  buildBadges();
  handPhase = 'left';
  countEl.textContent = '0';
  bpmEl.textContent = '—';
  rightPill.className = 'hand-pill done';
  leftPill.className  = 'hand-pill left-active';
  comboLabel.textContent = 'Left Hand Hits';
  switchBtn.style.display = 'none';
  audioPaused = false;
  pauseBtn.textContent = '⏸ PAUSE';
  pauseBtn.classList.remove('paused');
  statusEl.textContent = 'Left hand — go!';
}

function handleFinish() {
  if (mode === 'hands') {
    if (handPhase === 'right') rightCount = displayedCount;
    else leftCount = displayedCount;
  }
  rafRunning = false;
  stopAudio();
  showCelebration();
}

function resetAll() {
  // audio thread state
  audioTapCount      = 0;
  audioEnergy        = 0;
  audioLastEnergy    = 0;
  audioCooldownUntil = 0;
  audioPaused        = false;
  bpmTimes           = [];
  // display state
  displayedCount     = 0;
  lastDisplayedAudioCount = 0;
  rightCount         = 0;
  leftCount          = 0;
  handPhase          = 'right';
  sessionMaxBpm      = 0;
  earnedBadges       = new Set();
  floodActive        = false;
  // DOM
  countEl.textContent = '0';
  bpmEl.textContent   = '—';
  powerBar.style.width = '0%';
  statusEl.textContent = 'Press START to begin!';
  pauseBtn.textContent = '⏸ PAUSE';
  pauseBtn.classList.remove('paused');
  rightPill.className = 'hand-pill right-active';
  leftPill.className  = 'hand-pill done';
  flooder.innerHTML   = '';
}

// ════════════════════════════════════════════
//  BADGES
// ════════════════════════════════════════════
function buildBadges() {
  badgesRow.innerHTML = '';
  BADGE_DEFS.forEach(b => {
    const el = document.createElement('div');
    el.className = 'badge'; el.id = 'badge-' + b.count;
    el.style.background = b.color;
    el.innerHTML = `<div class="badge-icon">${b.icon}</div><div class="badge-name">${b.name}</div><div class="badge-count">${b.count}</div>`;
    badgesRow.appendChild(el);
  });
}

function checkBadges(total) {
  BADGE_DEFS.forEach(b => {
    if (total >= b.count && !earnedBadges.has(b.count)) {
      earnedBadges.add(b.count);
      const el = document.getElementById('badge-' + b.count);
      if (el) { el.classList.add('earned','just-earned'); setTimeout(() => el.classList.remove('just-earned'), 400); }
      spawnBadgeBurst(b.icon + ' ' + b.name + '!');
      if (!floodActive) floodEmoji(b.icon);
    }
  });
}

// ════════════════════════════════════════════
//  VISUAL EFFECTS  (main thread, rAF-triggered)
// ════════════════════════════════════════════
function spawnBurst() {
  const word = COMBO_WORDS[Math.floor(Math.random() * COMBO_WORDS.length)];
  const el = document.createElement('div'); el.className = 'burst'; el.textContent = word;
  const rect = countEl.getBoundingClientRect();
  el.style.left = (rect.left + rect.width/2 - 40 + (Math.random()*60-30)) + 'px';
  el.style.top  = (rect.top - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 520);
}

function spawnBadgeBurst(text) {
  const el = document.createElement('div'); el.className = 'burst';
  el.textContent = text; el.style.fontSize = '20px';
  const rect = badgesRow.getBoundingClientRect();
  el.style.left = (rect.left + rect.width/2 - 60) + 'px';
  el.style.top  = (rect.top - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

function floodEmoji(emoji) {
  floodActive = true;
  flooder.innerHTML = '';
  const cols = 7, rows = 4;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const el = document.createElement('div');
      el.className = 'flood-emoji';
      el.textContent = emoji;
      const x   = (c / (cols-1)) * 88 + 4 + (Math.random()*4-2);
      const sz  = 28 + Math.random()*16;
      const dur = 1.8 + Math.random()*0.8;
      const delay = r * 0.18 + Math.random()*0.08;
      el.style.cssText = `left:${x}%;bottom:${-10 - r*55}px;font-size:${sz}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
      flooder.appendChild(el);
    }
  }
  setTimeout(() => { flooder.innerHTML = ''; floodActive = false; }, 3800);
}

// ════════════════════════════════════════════
//  CONFETTI
// ════════════════════════════════════════════
const confCanvas = document.getElementById('confetti-canvas');
const confCtx    = confCanvas.getContext('2d');
let confetti = [], confRunning = false;
const CONF_COLORS = ['#e8473f','#3b82f6','#ffe066','#16a34a','#f97316','#6366f1','#ec4899'];

function startConfetti() {
  confCanvas.width = window.innerWidth; confCanvas.height = window.innerHeight;
  confetti = [];
  for (let i = 0; i < 160; i++) confetti.push({
    x: Math.random()*confCanvas.width, y: -20 - Math.random()*confCanvas.height*.5,
    w: 8+Math.random()*8, h: 8+Math.random()*8,
    color: CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)],
    rot: Math.random()*360, rotSpeed: (Math.random()-.5)*6,
    speed: 2+Math.random()*4, drift: (Math.random()-.5)*1.5, opacity: .8+Math.random()*.2
  });
  confRunning = true;
  animateConfetti();
}
function stopConfetti() { confRunning = false; confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); }
function animateConfetti() {
  if (!confRunning) return;
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  confetti.forEach(p => {
    p.y+=p.speed; p.x+=p.drift; p.rot+=p.rotSpeed;
    confCtx.save(); confCtx.globalAlpha=p.opacity;
    confCtx.translate(p.x+p.w/2,p.y+p.h/2); confCtx.rotate(p.rot*Math.PI/180);
    confCtx.fillStyle=p.color; confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h); confCtx.restore();
  });
  confetti = confetti.filter(p => p.y < confCanvas.height+20);
  if (confetti.length > 0) requestAnimationFrame(animateConfetti);
  else { confRunning = false; confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); }
}

// ════════════════════════════════════════════
//  CELEBRATION SCREEN
// ════════════════════════════════════════════
function formatDateTime(d) {
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · ${h}:${m < 10 ? '0'+m : m} ${ampm}`;
}

function showCelebration() {
  const total = mode === 'hands' ? rightCount + leftCount : displayedCount;
  const sub = total >= 500 ? 'You hit your goal! 🏆' : total >= 250 ? 'More than halfway there! 💪' : total >= 100 ? 'Great practice session!' : 'Keep it up!';
  document.getElementById('cel-sub').textContent = sub;
  document.getElementById('cel-datetime').textContent = formatDateTime(new Date());
  document.getElementById('cel-stat-grid').innerHTML = `
    <div class="stat-box"><div class="s-num">${total}</div><div class="s-lbl">Total Hits</div></div>
    <div class="stat-box"><div class="s-num" style="color:#d97706">${sessionMaxBpm || '—'}</div><div class="s-lbl">Peak BPM</div></div>`;
  const hs = document.getElementById('cel-hand-stats');
  if (mode === 'hands') {
    hs.style.display = 'grid';
    hs.innerHTML = `
      <div class="hand-stat-box right-box"><div class="hs-num">👊 ${rightCount}</div><div class="hs-lbl">Right Hand</div></div>
      <div class="hand-stat-box left-box"><div class="hs-num">✋ ${leftCount}</div><div class="hs-lbl">Left Hand</div></div>`;
  } else { hs.style.display = 'none'; }
  // Recompute badges from combined total for celebration screen
  const celTotal = mode === 'hands' ? rightCount + leftCount : displayedCount;
  const celBadges = new Set();
  BADGE_DEFS.forEach(b => { if (celTotal >= b.count) celBadges.add(b.count); });
  const cb = document.getElementById('cel-badges'); cb.innerHTML = '';
  if (celBadges.size === 0) {
    cb.innerHTML = '<div style="font-size:13px;color:#aaa;font-weight:700;">No badges yet — keep practicing!</div>';
  } else {
    BADGE_DEFS.filter(b => celBadges.has(b.count)).forEach(b => {
      const el = document.createElement('div'); el.className = 'celebrate-badge'; el.style.background = b.color;
      el.innerHTML = `<div class="cb-icon">${b.icon}</div><div class="cb-name">${b.name}</div>`;
      cb.appendChild(el);
    });
  }
  showScreen('celebrate-screen');
  startConfetti();
}

function playAgain() {
  stopConfetti();
  rafRunning = false;
  resetAll();
  buildBadges();
  mainBtns.style.display = 'flex';
  runningBtns.style.display = 'none';
  showScreen('main-screen');
}

function downloadCelebration() {
  if (typeof html2canvas !== 'undefined') {
    html2canvas(document.getElementById('celebrate-screen'), { backgroundColor:'#fff9e6', scale:2 }).then(canvas => {
      const a = document.createElement('a'); a.download = 'drum-battle-result.png'; a.href = canvas.toDataURL(); a.click();
    });
  } else { alert('To save: take a screenshot! (Mac: Cmd+Shift+4)'); }
}
